name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish win-x64
        run: |
          dotnet publish src/apix -c Release -r win-x64 --self-contained true \
            -p:Version=$VERSION -p:PublishSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Publish linux-x64
        run: |
          dotnet publish src/apix -c Release -r linux-x64 --self-contained true \
            -p:Version=$VERSION -p:PublishSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Publish osx-x64
        run: |
          dotnet publish src/apix -c Release -r osx-x64 --self-contained true \
            -p:Version=$VERSION -p:PublishSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Publish osx-arm64
        run: |
          dotnet publish src/apix -c Release -r osx-arm64 --self-contained true \
            -p:Version=$VERSION -p:PublishSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false

      - name: Pack nupkg
        run: dotnet pack src/apix -c Release -p:Version=$VERSION

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp src/apix/bin/Release/net10.0/win-x64/publish/apix.exe   dist/apix-win-x64.exe
          cp src/apix/bin/Release/net10.0/linux-x64/publish/apix     dist/apix-linux-x64
          cp src/apix/bin/Release/net10.0/osx-x64/publish/apix       dist/apix-osx-x64
          cp src/apix/bin/Release/net10.0/osx-arm64/publish/apix     dist/apix-osx-arm64
          cp src/apix/bin/Release/apix.$VERSION.nupkg                dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/apix-win-x64.exe
            dist/apix-linux-x64
            dist/apix-osx-x64
            dist/apix-osx-arm64
            dist/apix.${{ env.VERSION }}.nupkg
